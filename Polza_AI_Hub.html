<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Polza AI Chat - Material You</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --m3-bg: #fdfbff;
            --m3-surface: #f3f3f8;
            --m3-surface-variant: #e1e2ec;
            --m3-primary: #005ac1;
            --m3-on-primary: #ffffff;
            --m3-primary-container: #d8e2ff;
            --m3-on-primary-container: #001a41;
            --m3-secondary: #575e71;
            --m3-outline: #747781;
            --m3-on-surface: #1b1b1f;
            --m3-on-surface-variant: #44474f;
            --radius-xl: 28px;
            --radius-l: 16px;
        }

        [data-theme="dark"] {
            --m3-bg: #1b1b1f;
            --m3-surface: #232326;
            --m3-surface-variant: #44474f;
            --m3-primary: #adc6ff;
            --m3-on-primary: #002e69;
            --m3-primary-container: #004494;
            --m3-on-primary-container: #d8e2ff;
            --m3-secondary: #bfc6dc;
            --m3-outline: #8e9099;
            --m3-on-surface: #e3e2e6;
            --m3-on-surface-variant: #c4c6d0;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--m3-bg); 
            color: var(--m3-on-surface);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* Mobile Optimized Header */
        header {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--m3-surface);
            border-bottom: 1px solid var(--m3-surface-variant);
            flex-shrink: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .model-selector {
            background: var(--m3-surface-variant);
            padding: 6px 12px;
            border-radius: var(--radius-l);
            border: none;
            color: var(--m3-on-surface);
            font-size: 13px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            max-width: 140px;
        }

        /* Main Container */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* Chat Scroller */
        #chat-scroller {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            scroll-behavior: smooth;
        }

        .msg-bubble {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: var(--radius-l);
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .msg-user {
            align-self: flex-end;
            background: var(--m3-primary);
            color: var(--m3-on-primary);
            border-bottom-right-radius: 4px;
        }

        .msg-ai {
            align-self: flex-start;
            background: var(--m3-surface-variant);
            color: var(--m3-on-surface);
            border-bottom-left-radius: 4px;
        }

        /* Bottom Input Bar */
        .bottom-bar {
            padding: 12px 16px;
            background: var(--m3-bg);
            flex-shrink: 0;
        }

        .input-holder {
            background: var(--m3-surface-variant);
            border-radius: var(--radius-xl);
            padding: 4px 4px 4px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .input-holder input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--m3-on-surface);
            font-size: 16px;
            padding: 10px 0;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: var(--m3-primary);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
        }

        .send-btn:active {
            transform: scale(0.95);
            background: var(--m3-primary-container);
            color: var(--m3-on-primary-container);
        }

        /* Utils */
        .icon-btn {
            background: none;
            border: none;
            color: var(--m3-on-surface-variant);
            cursor: pointer;
            font-size: 18px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .icon-btn:active { background: var(--m3-surface-variant); }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--m3-surface);
            border-top: 2px solid var(--m3-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Tablet/Desktop tweaks */
        @media (min-width: 600px) {
            header { padding: 16px 24px; }
            .msg-bubble { max-width: 80%; }
            .bottom-bar { padding: 16px 24px; }
        }

    </style>
</head>

                { id: 'amazon/nova-micro-v1', name: 'Amazon: Nova Micro 1.0' },
                { id: 'alpindale/goliath-120b', name: 'Goliath 120B' },
                { id: 'allenai/olmo-3.1-32b-instruct', name: 'AllenAI: Olmo 3.1 32B Instruct' },
                { id: 'allenai/olmo-3-32b-think', name: 'AllenAI: Olmo 3 32B Think' },
                { id: 'alibaba/tongyi-deepresearch-30b-a3b', name: 'Tongyi DeepResearch 30B A3B' },
                { id: 'alfredpros/codellama-7b-instruct-solidity', name: 'AlfredPros: CodeLLaMa 7B Instruct Solidity' },
                { id: 'aion-labs/aion-rp-llama-3.1-8b', name: 'AionLabs: Aion-RP 1.0 (8B)' },
                { id: 'aion-labs/aion-1.0-mini', name: 'AionLabs: Aion-1.0-Mini' },
                { id: 'aion-labs/aion-1.0', name: 'AionLabs: Aion-1.0' },
                { id: 'ai21/jamba-large-1.7', name: 'AI21: Jamba Large 1.7' },
            ]
        };

        let chatHistory = JSON.parse(localStorage.getItem('elka_chat_history') || '[]');

        window.onload = () => {
            initModelSelector();
            renderChat();
            if (chatHistory.length === 0) {
                addMessage('assistant', 'Привет! Я твой AI-ассистент. Оптимизирован под мобильные устройства. О чем хочешь поговорить?', false);
            }
            updateThemeIcon();
        };

        function initModelSelector() {
            const select = document.getElementById('model-select');
            select.innerHTML = CONFIG.CHAT_MODELS.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        }

        function toggleTheme() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const isDark = document.body.getAttribute('data-theme') === 'dark';
            document.getElementById('theme-icon').innerHTML = `<i class="fa-solid fa-${isDark ? 'moon' : 'sun'}"></i>`;
        }

        // --- CHAT LOGIC ---
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            const model = document.getElementById('model-select').value;
            
            if (!text) return;

            addMessage('user', text);
            input.value = '';
            document.getElementById('chat-loader').style.display = 'block';

            try {
                const response = await fetch(`${CONFIG.BASE_URL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${CONFIG.API_KEY}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: chatHistory.map(m => ({ role: m.role, content: m.text })).concat([{ role: 'user', content: text }])
                    })
                });

                if (!response.ok) throw new Error('API Error');

                const data = await response.json();
                const reply = data.choices[0].message.content;
                addMessage('assistant', reply);
            } catch (err) {
                addMessage('assistant', 'Произошла ошибка. Проверь соединение или API ключ.');
            } finally {
                document.getElementById('chat-loader').style.display = 'none';
            }
        }

        function addMessage(role, text, save = true) {
            if (save) {
                chatHistory.push({ role, text });
                localStorage.setItem('elka_chat_history', JSON.stringify(chatHistory));
            }
            renderChat();
        }

        function renderChat() {
            const scroller = document.getElementById('chat-scroller');
            scroller.innerHTML = '';
            chatHistory.forEach(msg => {
                const div = document.createElement('div');
                div.className = `msg-bubble ${msg.role === 'user' ? 'msg-user' : 'msg-ai'}`;
                div.innerText = msg.text;
                scroller.appendChild(div);
            });
            scroller.scrollTop = scroller.scrollHeight;
        }

        function clearHistory() {
            if (confirm('Очистить историю?')) {
                chatHistory = [];
                localStorage.removeItem('elka_chat_history');
                renderChat();
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', e => { 
            if(e.key === 'Enter') sendMessage(); 
        });
    </script>
</body>
</html>
