<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dura AI — Вход</title>
    <meta name="description" content="AI ассистент нового поколения. Войдите или зарегистрируйтесь.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <div class="auth-bg">
        <div class="auth-bg-orb auth-bg-orb--1"></div>
        <div class="auth-bg-orb auth-bg-orb--2"></div>
        <div class="auth-bg-orb auth-bg-orb--3"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="auth-logo-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                        <defs>
                            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#a78bfa"/>
                                <stop offset="100%" style="stop-color:#6366f1"/>
                            </linearGradient>
                        </defs>
                        <rect width="40" height="40" rx="12" fill="url(#logoGrad)"/>
                        <path d="M12 20C12 15.6 15.6 12 20 12C24.4 12 28 15.6 28 20M16 20C16 17.8 17.8 16 20 16C22.2 16 24 17.8 24 20M20 20V28M16 26H24" stroke="white" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </div>
                <h1>Dura AI</h1>
                <p class="auth-subtitle">AI ассистент нового поколения</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="login" id="tab-login">Вход</button>
                <button class="auth-tab" data-tab="register" id="tab-register">Регистрация</button>
                <div class="auth-tab-indicator"></div>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="login-username">Логин</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" id="login-username" placeholder="Введите логин" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-password">Пароль</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="login-password" placeholder="Введите пароль" required autocomplete="current-password">
                    </div>
                </div>
                <div id="login-error" class="form-error" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-full" id="login-btn">
                    <span>Войти</span>
                    <div class="btn-loader" style="display:none"></div>
                </button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" style="display:none">
                <div class="form-group">
                    <label for="reg-username">Логин</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        <input type="text" id="reg-username" placeholder="Минимум 3 символа" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        <input type="password" id="reg-password" placeholder="Минимум 6 символов" required autocomplete="new-password">
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-password2">Подтвердите пароль</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
                        <input type="password" id="reg-password2" placeholder="Повторите пароль" required autocomplete="new-password">
                    </div>
                </div>
                <div class="form-group">
                    <label for="reg-secret">Секретное слово</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                        <input type="password" id="reg-secret" placeholder="Введите секретное слово" required>
                    </div>
                </div>
                <div id="register-error" class="form-error" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-full" id="register-btn">
                    <span>Зарегистрироваться</span>
                    <div class="btn-loader" style="display:none"></div>
                </button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
